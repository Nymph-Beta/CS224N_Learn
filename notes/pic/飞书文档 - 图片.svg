<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
<!-- design-philosophy: mueller-brockmann -->
<!-- accent-color: #d25d5a -->
<!-- grid-base: 8 -->
<rect x="0" y="0" width="1280" height="720" fill="#ffffff"/>
<defs>
<marker id="arrow_blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><polygon points="0 1, 10 5, 0 9" fill="#5178c6"/></marker>
<marker id="arrow_red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><polygon points="0 1, 10 5, 0 9" fill="#d25d5a"/></marker>
<marker id="arrow_grey" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><polygon points="0 1, 10 5, 0 9" fill="#8f959e"/></marker>
</defs>

<!-- Title -->
<text x="64" y="72" fill="#1f2329" font-family="sans-serif" font-size="20" font-weight="bold">Lecture 3 · 反向传播：误差信号沿计算图回流</text>
<text x="64" y="98" fill="#8f959e" font-family="sans-serif" font-size="13">前向 x → W → a → U → s 计算激活；反向 δ 从输出 s 出发，逐节点回传至 x</text>

<!-- Legend -->
<line x1="880" y1="78" x2="918" y2="78" stroke="#5178c6" stroke-width="1.5" marker-end="url(#arrow_blue)"/>
<text x="926" y="82" fill="#1f2329" font-family="sans-serif" font-size="12">前向 forward</text>
<line x1="1040" y1="78" x2="1078" y2="78" stroke="#d25d5a" stroke-width="1.5" marker-end="url(#arrow_red)"/>
<text x="1086" y="82" fill="#1f2329" font-family="sans-serif" font-size="12">反向 δ backward</text>

<!-- Top axis: Forward chain x -> W -> a -> U -> s -->
<text x="64" y="158" fill="#5178c6" font-family="sans-serif" font-size="12" font-weight="bold">前向 · 计算图</text>

<!-- Node x -->
<rect x="80" y="180" width="160" height="92" rx="4" fill="#f0f4fc" stroke="#5178c6" stroke-width="1"/>
<text x="160" y="218" fill="#1f2329" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle">x</text>
<text x="160" y="248" fill="#8f959e" font-family="sans-serif" font-size="11" text-anchor="middle">输入向量</text>
<text x="160" y="264" fill="#8f959e" font-family="sans-serif" font-size="11" text-anchor="middle">input</text>

<!-- Edge W -->
<rect x="280" y="180" width="160" height="92" rx="4" fill="#f0f4fc" stroke="#5178c6" stroke-width="1"/>
<text x="360" y="216" fill="#1f2329" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">W</text>
<text x="360" y="244" fill="#1f2329" font-family="sans-serif" font-size="13" text-anchor="middle">u = W x</text>
<text x="360" y="264" fill="#8f959e" font-family="sans-serif" font-size="11" text-anchor="middle">第一层线性映射</text>

<!-- Node a -->
<rect x="480" y="180" width="160" height="92" rx="4" fill="#f0f4fc" stroke="#5178c6" stroke-width="1"/>
<text x="560" y="216" fill="#1f2329" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">a</text>
<text x="560" y="244" fill="#1f2329" font-family="sans-serif" font-size="13" text-anchor="middle">a = f(u) = f(W x)</text>
<text x="560" y="264" fill="#8f959e" font-family="sans-serif" font-size="11" text-anchor="middle">激活值 hidden</text>

<!-- Edge U -->
<rect x="680" y="180" width="160" height="92" rx="4" fill="#f0f4fc" stroke="#5178c6" stroke-width="1"/>
<text x="760" y="216" fill="#1f2329" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">U</text>
<text x="760" y="244" fill="#1f2329" font-family="sans-serif" font-size="13" text-anchor="middle">s = U a</text>
<text x="760" y="264" fill="#8f959e" font-family="sans-serif" font-size="11" text-anchor="middle">输出层线性映射</text>

<!-- Node s -->
<rect x="880" y="180" width="160" height="92" rx="4" fill="#fee3e2" stroke="#d25d5a" stroke-width="1.5"/>
<text x="960" y="218" fill="#1f2329" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle">s</text>
<text x="960" y="248" fill="#8f959e" font-family="sans-serif" font-size="11" text-anchor="middle">输出分数 / 标量目标</text>
<text x="960" y="264" fill="#8f959e" font-family="sans-serif" font-size="11" text-anchor="middle">误差信号起点</text>

<!-- Forward arrows -->
<line x1="240" y1="226" x2="280" y2="226" stroke="#5178c6" stroke-width="1.5" marker-end="url(#arrow_blue)"/>
<line x1="440" y1="226" x2="480" y2="226" stroke="#5178c6" stroke-width="1.5" marker-end="url(#arrow_blue)"/>
<line x1="640" y1="226" x2="680" y2="226" stroke="#5178c6" stroke-width="1.5" marker-end="url(#arrow_blue)"/>
<line x1="840" y1="226" x2="880" y2="226" stroke="#5178c6" stroke-width="1.5" marker-end="url(#arrow_blue)"/>

<!-- Vertical connectors between forward nodes and backward formulas -->
<line x1="160" y1="272" x2="160" y2="332" stroke="#bbbfc4" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="360" y1="272" x2="360" y2="332" stroke="#bbbfc4" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="560" y1="272" x2="560" y2="332" stroke="#bbbfc4" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="760" y1="272" x2="760" y2="332" stroke="#bbbfc4" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="960" y1="272" x2="960" y2="332" stroke="#bbbfc4" stroke-width="1" stroke-dasharray="4,4"/>

<!-- Backward chain section -->
<text x="64" y="358" fill="#d25d5a" font-family="sans-serif" font-size="12" font-weight="bold">反向 · 误差信号 δ 从右向左回传</text>

<!-- δ_x -->
<rect x="80" y="380" width="160" height="92" rx="4" fill="#ffffff" stroke="#d25d5a" stroke-width="1"/>
<text x="160" y="408" fill="#d25d5a" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">δ at x</text>
<text x="160" y="438" fill="#1f2329" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">δ_x = Wᵀ δ_a</text>
<text x="160" y="458" fill="#8f959e" font-family="sans-serif" font-size="11" text-anchor="middle">输入端梯度</text>

<!-- ∇W (between x and a, attached to W column) -->
<rect x="280" y="380" width="160" height="92" rx="4" fill="#fef1ce" stroke="#d4b45b" stroke-width="1"/>
<text x="360" y="408" fill="#a07a14" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">∇W · 参数梯度</text>
<text x="360" y="438" fill="#1f2329" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">∇W = δ_a xᵀ</text>
<text x="360" y="458" fill="#8f959e" font-family="sans-serif" font-size="11" text-anchor="middle">用于更新第一层权重</text>

<!-- δ_a -->
<rect x="480" y="380" width="160" height="92" rx="4" fill="#ffffff" stroke="#d25d5a" stroke-width="1"/>
<text x="560" y="408" fill="#d25d5a" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">δ at a</text>
<text x="560" y="436" fill="#1f2329" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">δ_a = f′(W x) ∘ (Uᵀ δ_s)</text>
<text x="560" y="458" fill="#8f959e" font-family="sans-serif" font-size="11" text-anchor="middle">隐藏层误差信号</text>

<!-- ∇U (attached to U column) -->
<rect x="680" y="380" width="160" height="92" rx="4" fill="#fef1ce" stroke="#d4b45b" stroke-width="1"/>
<text x="760" y="408" fill="#a07a14" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">∇U · 参数梯度</text>
<text x="760" y="438" fill="#1f2329" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">∇U = δ_s aᵀ</text>
<text x="760" y="458" fill="#8f959e" font-family="sans-serif" font-size="11" text-anchor="middle">用于更新输出层权重</text>

<!-- δ_s -->
<rect x="880" y="380" width="160" height="92" rx="4" fill="#fee3e2" stroke="#d25d5a" stroke-width="1.5"/>
<text x="960" y="408" fill="#d25d5a" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">δ at s · 起点</text>
<text x="960" y="438" fill="#1f2329" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">δ_s = ∂J / ∂s</text>
<text x="960" y="458" fill="#8f959e" font-family="sans-serif" font-size="11" text-anchor="middle">输出端误差源头</text>

<!-- Backward arrows (right -> left) -->
<line x1="880" y1="426" x2="840" y2="426" stroke="#d25d5a" stroke-width="1.5" marker-end="url(#arrow_red)"/>
<line x1="680" y1="426" x2="640" y2="426" stroke="#d25d5a" stroke-width="1.5" marker-end="url(#arrow_red)"/>
<line x1="480" y1="426" x2="440" y2="426" stroke="#d25d5a" stroke-width="1.5" marker-end="url(#arrow_red)"/>
<line x1="280" y1="426" x2="240" y2="426" stroke="#d25d5a" stroke-width="1.5" marker-end="url(#arrow_red)"/>

<!-- Chain rule annotation panel -->
<rect x="80" y="520" width="1120" height="148" rx="4" fill="#f5f5f5" stroke="#dee0e3" stroke-width="1"/>
<text x="104" y="552" fill="#1f2329" font-family="sans-serif" font-size="13" font-weight="bold">链式法则 · 沿计算图逐节点应用</text>

<!-- Step 1 -->
<rect x="104" y="568" width="252" height="80" rx="4" fill="#ffffff" stroke="#dee0e3" stroke-width="1"/>
<text x="116" y="588" fill="#8f959e" font-family="sans-serif" font-size="11">① 输出端起点</text>
<text x="116" y="614" fill="#d25d5a" font-family="sans-serif" font-size="15" font-weight="bold">δ_s = ∂J/∂s</text>
<text x="116" y="636" fill="#8f959e" font-family="sans-serif" font-size="11">从 s 节点取损失对 s 的导数</text>

<!-- Step 2 -->
<rect x="372" y="568" width="252" height="80" rx="4" fill="#ffffff" stroke="#dee0e3" stroke-width="1"/>
<text x="384" y="588" fill="#8f959e" font-family="sans-serif" font-size="11">② 经 U 回传到 a</text>
<text x="384" y="614" fill="#d25d5a" font-family="sans-serif" font-size="15" font-weight="bold">δ_a = f′(W x) ∘ (Uᵀ δ_s)</text>
<text x="384" y="636" fill="#8f959e" font-family="sans-serif" font-size="11">线性映射转置 + 激活函数导数</text>

<!-- Step 3 -->
<rect x="640" y="568" width="252" height="80" rx="4" fill="#ffffff" stroke="#dee0e3" stroke-width="1"/>
<text x="652" y="588" fill="#8f959e" font-family="sans-serif" font-size="11">③ 经 W 回传到 x</text>
<text x="652" y="614" fill="#d25d5a" font-family="sans-serif" font-size="15" font-weight="bold">δ_x = Wᵀ δ_a</text>
<text x="652" y="636" fill="#8f959e" font-family="sans-serif" font-size="11">输入端误差，用于上游层继续回传</text>

<!-- Step 4 -->
<rect x="908" y="568" width="276" height="80" rx="4" fill="#ffffff" stroke="#dee0e3" stroke-width="1"/>
<text x="920" y="588" fill="#8f959e" font-family="sans-serif" font-size="11">④ 参数梯度</text>
<text x="920" y="612" fill="#a07a14" font-family="sans-serif" font-size="14" font-weight="bold">∇U = δ_s aᵀ</text>
<text x="920" y="634" fill="#a07a14" font-family="sans-serif" font-size="14" font-weight="bold">∇W = δ_a xᵀ</text>

<!-- Footer -->
<text x="64" y="700" fill="#8f959e" font-family="sans-serif" font-size="11">阅读路径：上方蓝色链路 x → W → a → U → s 为前向；下方红色 δ 自 s 出发逐节点回流到 x；金色卡片为对应参数梯度。</text>
</svg>